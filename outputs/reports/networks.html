  header { padding: 12px 20px; background: #1a1d27; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; color: #fff; }
  header span { font-size: 12px; color: #666; }
  .tabs { display: flex; gap: 6px; margin-left: auto; }
  .tab { padding: 6px 14px; border-radius: 6px; border: 1px solid #2a2d3a; background: transparent; color: #999; font-size: 12px; cursor: pointer; transition: all .15s; }
  .tab:hover { border-color: #444; color: #ccc; }
  .tab.active { color: #fff; font-weight: 600; }
  .tab.collab.active  { background: #2563eb; border-color: #2563eb; }
  .tab.comment.active { background: #c2410c; border-color: #c2410c; }
  .tab.both.active    { background: #15803d; border-color: #15803d; }
  .year-tabs { display: flex; gap: 4px; margin-left: 16px; padding-left: 16px; border-left: 1px solid #2a2d3a; }
  .ytab { padding: 6px 12px; border-radius: 6px; border: 1px solid #2a2d3a; background: transparent; color: #999; font-size: 12px; cursor: pointer; transition: all .15s; }
  .ytab:hover { border-color: #555; color: #ccc; }
  .ytab.active { background: #44403c; border-color: #78716c; color: #fde68a; font-weight: 600; }

  #main { flex: 1; display: flex; overflow: hidden; }
  #canvas { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; }

  /* Right panel */
  #panel {
    width: 220px; flex-shrink: 0; background: #1a1d27; border-left: 1px solid #2a2d3a;
    overflow-y: auto; padding: 12px 0;
  }
  #panel h3 { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 0 14px 8px; border-bottom: 1px solid #2a2d3a; margin-bottom: 4px; }
  .ngo-row { display: flex; align-items: center; gap: 8px; padding: 5px 14px;
    cursor: default; border-radius: 0; transition: background .1s; }
  .ngo-row:hover, .ngo-row.active { background: #252836; }
  .ngo-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ngo-code { font-size: 11px; font-weight: 700; color: #fff; width: 28px; flex-shrink: 0; font-family: monospace; }
  .ngo-name { font-size: 11px; color: #aaa; line-height: 1.3; }

  .node circle { stroke-width: 2; cursor: pointer; }
  .node text { pointer-events: none; font-weight: 600; text-anchor: middle; dominant-baseline: hanging; }
  .node:hover circle { stroke: #fff !important; stroke-width: 3 !important; }
  .link { fill: none; stroke-linecap: round; }

  #tooltip {
    position: absolute; pointer-events: none; background: #1e2130; border: 1px solid #333;
    border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.7;
    max-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,.6); display: none; z-index: 10;
  }
  #tooltip b { color: #fff; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-right: 3px; }
  .badge.c  { background: #1e3a8a; color: #93c5fd; }
  .badge.m  { background: #7c2d12; color: #fdba74; }
  .badge.mx { background: #14532d; color: #86efac; }

  #legend { position: absolute; bottom: 14px; left: 14px; background: #1a1d27dd;
    border: 1px solid #2a2d3a; border-radius: 8px; padding: 10px 14px; font-size: 11px; line-height: 2; }
  #legend .dot { display: inline-block; width: 22px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  #stats { position: absolute; top: 10px; left: 14px; background: #1a1d27dd;
    border: 1px solid #2a2d3a; border-radius: 8px; padding: 7px 12px; font-size: 11px; color: #888; line-height: 1.8; }
  #stats b { color: #ddd; }
</style>
</head>

  fct: '#fb923c',  // Fakta o klimatu  — orange-light
  fff: '#facc15',  // FFF              — yellow-light
  ext: '#f87171',  // Ext Rebellion    — red-light
  lau: '#86efac',  // Limity jsme my   — green-light
  bel: '#93c5fd',  // Beleco           — blue-light
  upe: '#c4b5fd',  // CSOP             — purple-light
  aut: '#94a3b8',  // Autoklub         — slate
  aes: '#64748b',  // AliES            — slate-dark
};

// Full names for panel
const NGO_FULL = {
  aes: 'Aliance pro energetickou sobestacnost',
  arn: 'Arnika',
  aut: 'Autoklub CR',
  bel: 'Beleco',
  cal: 'Calla - Sdruzeni pro zachranu prostredi',
  ccc: 'Klimaticka koalice',
  cde: 'Centrum pro dopravu a energetiku',
  cit: 'CI2',
  ext: 'Extinction Rebellion / Posledni generace',
  fct: 'Fakta o klimatu',
  fff: 'Fridays for Future',
  foe: 'Hnuti Duha',
  frb: 'Frank Bold',
  grn: 'Zeleny kruh',
  grp: 'Greenpeace CR',
  lau: 'Limity jsme my',
  nes: 'Nesehnuti',
  upe: 'Cesky svaz ochrancu prirody',
  ver: 'Ekologicky institut Veronica',
};

function buildPanel() {
  const panel = document.getElementById('panel');
  // keep header, remove old rows
  panel.querySelectorAll('.ngo-row').forEach(r => r.remove());
  Object.entries(NGO_FULL).sort((a,b) => a[0].localeCompare(b[0])).forEach(([code, name]) => {
    const row = document.createElement('div');
    row.className = 'ngo-row';
    row.id = `row-${code}`;
    row.innerHTML = `<span class="ngo-dot" style="background:${NODE_COLOR[code]||'#666'}"></span>
      <span class="ngo-code">${code}</span>
      <span class="ngo-name">${name}</span>`;
    panel.appendChild(row);
  });
}

let currentView = 'collab';
let currentYear = 'total';
let simulation, svg, linkGroup, nodeGroup;
let width, height;

function getSourceEdges() {
  return currentYear === '2025' ? EDGES_2025 : RAW_EDGES;
}

function getViewEdges(view) {
  const src = getSourceEdges();
  if (view === 'collab')  return src.filter(e => e.is_collab === 1);
  if (view === 'comment') return src.filter(e => e.comment > 0);
  return src; // both
}

function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.ytab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.ytab[onclick="setYear('${y}')"]`).classList.add('active');
  const title = y === '2025'
    ? 'Czech NGO Network — 2025 only'
    : 'Czech NGO Network — Total (2016–2025)';
  document.getElementById('header-title').textContent = title;
  if (simulation) simulation.stop();
  draw(currentView);
}

function edgeColor(e, view) {
  if (view === 'collab')  return COLORS.collab;
  if (view === 'comment') return COLORS.comment;
  // combined: colour by dominant signal
  if (e.is_collab && e.comment > 0) return COLORS.mixed;
  if (e.is_collab) return COLORS.collab;
  return COLORS.comment;
}

function edgeWeight(e, view) {
  const v = view === 'collab'  ? e.collab
          : view === 'comment' ? e.comment
          : e.total;
  return Math.max(1, Math.log2(v + 1) * 1.2);
}

function getActiveNodes(edges) {
  const ids = new Set();
  edges.forEach(e => { ids.add(e.src); ids.add(e.tgt); });
  return RAW_NODES.filter(n => ids.has(n.id));
}

function nodeDegree(id, edges) {
  return edges.filter(e => e.src === id || e.tgt === id).length;
}

function draw(view) {
  currentView = view;
  const svgEl = document.getElementById('svg');
  svgEl.innerHTML = '';
  width  = svgEl.clientWidth;
  height = svgEl.clientHeight;

  const rawEdges = getViewEdges(view);
  // Always show ALL 19 nodes, even isolated ones
  const nodes   = RAW_NODES.map(n => ({ ...n }));
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  const edges = rawEdges
    .filter(e => nodeMap[e.src] && nodeMap[e.tgt])
    .map(e => ({ ...e, source: e.src, target: e.tgt }));

  // Stats
  const yearLabel = currentYear === '2025' ? '2025' : '2016–2025';
  document.getElementById('stats').innerHTML =
    `<b>${nodes.length}</b> nodes &nbsp;·&nbsp; <b>${edges.length}</b> edges &nbsp;·&nbsp; <span style="color:#fde68a">${yearLabel}</span><br>` +
    (view === 'both'
      ? `<span style="color:#3b82f6">■</span> collab &nbsp;<span style="color:#f97316">■</span> co-mention &nbsp;<span style="color:#22c55e">■</span> mixed`
      : '');

  svg = d3.select('#svg');
  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 4]).on('zoom', e => g.attr('transform', e.transform)));

  // Arrow markers
  ['collab','comment','mixed'].forEach(type => {
    svg.append('defs').append('marker')
      .attr('id', `arrow-${type}`)
      .attr('viewBox', '0 -4 8 8').attr('refX', 18).attr('refY', 0)
      .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill',
        type === 'collab' ? COLORS.collab : type === 'comment' ? COLORS.comment : COLORS.mixed);
  });

  // Links
  linkGroup = g.selectAll('.link')
    .data(edges).enter().append('path')
    .attr('class', 'link')
    .attr('stroke', e => edgeColor(e, view))
    .attr('stroke-width', e => edgeWeight(e, view))
    .attr('stroke-opacity', 0.65)
    .attr('marker-end', e => {
      const t = view === 'both' ? (e.is_collab && e.comment > 0 ? 'mixed' : e.is_collab ? 'collab' : 'comment') : view === 'collab' ? 'collab' : 'comment';
      return `url(#arrow-${t})`;
    })
    .on('mouseover', function(event, e) {
      d3.select(this).attr('stroke-opacity', 1).attr('stroke-width', d => edgeWeight(d, view) + 1.5);
      const tt = document.getElementById('tooltip');
      const typeLabel = e.is_collab && e.comment > 0 ? '<span class="badge mx">mixed</span>'
                      : e.is_collab ? '<span class="badge c">collaboration</span>'
                      : '<span class="badge m">co-mention</span>';
      tt.innerHTML = `<b>${e.src} → ${e.tgt}</b><br>${typeLabel}<br>
        <span style="color:#3b82f6">● collab:</span> ${e.collab} &nbsp;
        <span style="color:#f97316">● co-mention:</span> ${e.comment} &nbsp;
        <span style="color:#888">total:</span> ${e.total}`;
      tt.style.display = 'block';
      tt.style.left = (event.pageX + 12) + 'px';
      tt.style.top  = (event.pageY - 10) + 'px';
    })
    .on('mousemove', function(event) {
      const tt = document.getElementById('tooltip');
      tt.style.left = (event.pageX + 12) + 'px';
      tt.style.top  = (event.pageY - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke-opacity', 0.65).attr('stroke-width', e => edgeWeight(e, view));
      document.getElementById('tooltip').style.display = 'none';
    });

  // Curved paths for bidirectional pairs
  const pairSet = new Set(edges.map(e => [e.src, e.tgt].sort().join('|')));
  const bidir   = new Set();
  pairSet.forEach(p => {
    const [a, b] = p.split('|');
    if (edges.find(e => e.src===a && e.tgt===b) && edges.find(e => e.src===b && e.tgt===a))
      bidir.add(p);
  });

  // Nodes — seed positions in a circle so simulation starts already spread
  const maxDeg = d3.max(nodes, n => nodeDegree(n.id, edges)) || 1;
  const rScale = d3.scaleSqrt().domain([0, maxDeg]).range([8, 24]);
  const initR  = Math.min(width, height) * 0.38;
  nodes.forEach((n, i) => {
    const angle = (i / nodes.length) * 2 * Math.PI;
    n.x = width  / 2 + initR * Math.cos(angle);
    n.y = height / 2 + initR * Math.sin(angle);
  });

  nodeGroup = g.selectAll('.node')
    .data(nodes).enter().append('g').attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('mouseover', function(event, d) {
      const deg = nodeDegree(d.id, edges);
      const out = edges.filter(e => e.src === d.id).length;
      const inn = edges.filter(e => e.tgt === d.id).length;
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<b style="color:${NODE_COLOR[d.id]}">${NGO_FULL[d.id]||d.id}</b>
        <span style="color:#555"> · ${d.id}</span><br>
        degree: <b>${deg}</b> &nbsp;·&nbsp; out: <b>${out}</b> &nbsp;·&nbsp; in: <b>${inn}</b>`;
      tt.style.display = 'block';
      tt.style.left = (event.pageX + 14) + 'px';
      tt.style.top  = (event.pageY - 10) + 'px';
      // highlight panel row
      document.querySelectorAll('.ngo-row').forEach(r => r.classList.remove('active'));
      const row = document.getElementById(`row-${d.id}`);
      if (row) { row.classList.add('active'); row.scrollIntoView({ block: 'nearest' }); }
    })
    .on('mousemove', function(event) {
      const tt = document.getElementById('tooltip');
      tt.style.left = (event.pageX + 14) + 'px';
      tt.style.top  = (event.pageY - 10) + 'px';
    })
    .on('mouseout', () => {
      document.getElementById('tooltip').style.display = 'none';
      document.querySelectorAll('.ngo-row').forEach(r => r.classList.remove('active'));
    });

  nodeGroup.append('circle')
    .attr('r', d => rScale(nodeDegree(d.id, edges)))
    .attr('fill', d => NODE_COLOR[d.id] || '#64748b')
    .attr('fill-opacity', 0.9)
    .attr('stroke', '#0f1117')
    .attr('stroke-width', 2);

  // Code label inside/below circle
  nodeGroup.append('text')
    .attr('dy', d => rScale(nodeDegree(d.id, edges)) + 14)
    .style('font-size', '11px')
    .style('fill', d => NODE_COLOR[d.id] || '#aaa')
    .text(d => d.id);

  // Simulation — strong repulsion + long links to spread graph out
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id)
      .distance(d => 160 + edgeWeight(d, view) * 12)
      .strength(0.4))
    .force('charge', d3.forceManyBody().strength(-1300).distanceMax(700))
    .force('center', d3.forceCenter(width / 2, height / 2).strength(0.04))
    .force('collision', d3.forceCollide().radius(d => rScale(nodeDegree(d.id, edges)) + 36))
    .force('x', d3.forceX(width  / 2).strength(0.02))
    .force('y', d3.forceY(height / 2).strength(0.02))
    .alphaDecay(0.025)
    .on('tick', () => {
      linkGroup.attr('d', d => {
        const pair = [d.src, d.tgt].sort().join('|');
        const isBi = bidir.has(pair);
        const sx = d.source.x, sy = d.source.y;
        const tx = d.target.x, ty = d.target.y;
        if (!isBi) return `M${sx},${sy}L${tx},${ty}`;
        const dx = tx - sx, dy = ty - sy;
        const dr = Math.sqrt(dx*dx + dy*dy) * 1.3;
        return `M${sx},${sy}A${dr},${dr} 0 0,1 ${tx},${ty}`;
      });
      nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Legend
  const legendLines = view === 'collab'
    ? [`<span class="dot" style="background:${COLORS.collab}"></span> Collaboration edge`]
    : view === 'comment'
    ? [`<span class="dot" style="background:${COLORS.comment}"></span> Co-mention edge`]
    : [
        `<span class="dot" style="background:${COLORS.collab}"></span> Collaboration only`,
        `<span class="dot" style="background:${COLORS.comment}"></span> Co-mention only`,
        `<span class="dot" style="background:${COLORS.mixed}"></span> Both (same pair)`,
      ];
  legendLines.push('<span style="color:#666">Edge thickness = evidence count</span>');
  legendLines.push('<span style="color:#666">Node size = degree &nbsp;·&nbsp; drag to rearrange</span>');
  document.getElementById('legend').innerHTML = legendLines.join('<br>');
}

function setView(v) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab.${v}`).classList.add('active');
  if (simulation) simulation.stop();
  draw(v);
}

window.addEventListener('resize', () => {
  if (simulation) simulation.stop();
  draw(currentView);
});

buildPanel();
draw('collab');
</script>
</body>
</html>
