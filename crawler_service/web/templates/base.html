<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}COMPON Crawler{% endblock %}</title>
<style>
  :root { --bg:#12151a; --panel:#1b2027; --border:#2c333d; --text:#d7dce2;
          --muted:#8a94a0; --green:#4caf7d; --red:#e06c60; --amber:#e0b050;
          --blue:#5b9dd9; --purple:#a98fd6; }
  * { box-sizing: border-box; }
  body { background:var(--bg); color:var(--text); margin:0;
         font:14px/1.5 system-ui, "Segoe UI", sans-serif; }
  a { color:var(--blue); text-decoration:none; }
  a:hover { text-decoration:underline; }
  header { background:var(--panel); border-bottom:1px solid var(--border);
           padding:10px 20px; display:flex; gap:24px; align-items:center; }
  header h1 { font-size:16px; margin:0; }
  header nav a { margin-right:14px; color:var(--muted); }
  header nav a.active, header nav a:hover { color:var(--text); }
  main { padding:20px; max-width:1500px; margin:0 auto; }
  table { border-collapse:collapse; width:100%; background:var(--panel);
          border:1px solid var(--border); font-size:13px; }
  th, td { padding:6px 10px; border-bottom:1px solid var(--border); text-align:left;
           white-space:nowrap; }
  th { color:var(--muted); font-weight:600; position:sticky; top:0;
       background:var(--panel); }
  tr:hover td { background:#20262e; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px;
           font-size:12px; font-weight:600; }
  .st-running { background:#173a2a; color:var(--green); }
  .st-queued  { background:#1d2f45; color:var(--blue); }
  .st-paused  { background:#3a3320; color:var(--amber); }
  .st-done    { background:#252b33; color:var(--muted); }
  .st-error, .st-failed { background:#3d2320; color:var(--red); }
  .st-blocked { background:#3d2320; color:var(--red); border:1px solid var(--red); }
  .st-ready   { background:#2a2340; color:var(--purple); }
  .st-new     { background:#252b33; color:var(--muted); }
  .flag { color:var(--amber); font-weight:700; }
  button, .btn { background:#28303a; color:var(--text); border:1px solid var(--border);
           border-radius:4px; padding:3px 10px; cursor:pointer; font-size:12px; }
  button:hover, .btn:hover { background:#333d49; }
  button.primary { background:#1e4633; border-color:#2c6a4b; }
  button.warn { background:#46331e; border-color:#6a4f2c; }
  .cards { display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:6px;
          padding:10px 18px; min-width:130px; }
  .card .v { font-size:22px; font-weight:700; }
  .card .l { color:var(--muted); font-size:12px; }
  input[type=text], input[type=number], textarea, select {
      background:#0f1216; color:var(--text); border:1px solid var(--border);
      border-radius:4px; padding:5px 8px; font-size:13px; width:100%; }
  textarea { font-family:ui-monospace, monospace; }
  form.inline { display:inline; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:6px;
           padding:14px 18px; margin-bottom:18px; }
  .panel h3 { margin-top:0; font-size:14px; color:var(--muted);
              text-transform:uppercase; letter-spacing:.05em; }
  .muted { color:var(--muted); }
  .lvl-error { color:var(--red); } .lvl-warning { color:var(--amber); }
  .lvl-info { color:var(--muted); }
  code { background:#0f1216; padding:1px 5px; border-radius:3px; font-size:12px; }
  .scroll { max-height:420px; overflow-y:auto; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<header>
  <h1>COMPON Crawler</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/curation">URL curation</a>
    <a href="/events">Events</a>
  </nav>
  <span id="hdr-status" class="muted" style="margin-left:auto"></span>
</header>
<main>
{% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
