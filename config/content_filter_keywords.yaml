keywords:
  # ========================================
  # 1. RELATIONAL TIES (Network Edges)
  # Source: COMPON Project (Ylä-Anttila et al., 2018)
  # These terms evidence actual network connections
  # ========================================
  relations:
    # --- Collaboration/Cooperation (Strong Ties) ---
    - root: "spoluprác"
      weight: 3
      variations: ["spolupráce", "spolupracovat", "spolupracující", "spolupracoval", "spolupracovníci", "spolupracujeme"]
      description: "Cooperation (COMPON Tie Type 1: Collaboration)"

    - root: "partner"
      weight: 3
      variations: ["partnerství", "partnerský", "strategický partner", "partnerská organizace", "partneři", "partnera"]
      description: "Partnership (Formal collaborative tie)"

    - root: "alianc"
      weight: 3
      variations: ["aliance", "aliancí", "alianci"]
      description: "Alliance (Formal coalition)"

    - root: "koalic"
      weight: 3
      variations: ["koalice", "koaliční", "koaličn"]
      description: "Coalition (Multi-actor grouping)"

    - root: "konsorci"
      weight: 4
      variations: ["konsorcium", "konsorcia", "člen konsorcia"]
      description: "Consortium (Research/Policy project - high discriminatory power)"

    - root: "memorand"
      weight: 4
      variations: ["memorandum", "memorandum o porozumění", "MoU"]
      description: "Memorandum of Understanding (Formal agreement - very high precision)"

    - root: "projekt"
      weight: 2
      variations: ["společný projekt", "projektový partner", "realizátor projektu", "projektů", "projektu"]
      description: "Joint Project (Operational tie)"

    - root: "společn"
      weight: 2
      variations: ["společně", "společná iniciativa", "společná akce", "společná kampaň"]
      description: "Joint/shared activities"

    # --- Information & Advice (Knowledge Ties - COMPON Tie Type 2) ---
    - root: "porad"
      weight: 3
      variations: ["poradní orgán", "poradce", "konzultace", "poradní sbor"]
      description: "Advice/Consultation (COMPON: Scientific Advice)"

    - root: "expert"
      weight: 3
      variations: ["expertní skupina", "expertní panel", "odborná skupina"]
      description: "Expert group (Knowledge exchange venue)"

    - root: "pracovní skupin"
      weight: 3
      variations: ["pracovní skupina", "pracovních skupin", "pracovní skupiny"]
      description: "Working group (Policy deliberation)"

    - root: "platform"
      weight: 2
      variations: ["platforma", "fórum", "kulatý stůl", "platformy"]
      description: "Platform/Forum (Venue for Information Exchange)"


    # --- Membership & Structure ---
    - root: "člen"
      weight: 2
      variations: ["člen", "členství", "členové", "členů", "člena", "členem"]
      description: "Member/membership (Network participation)"

    - root: "sdružen"
      weight: 2
      variations: ["sdružení", "sdružovat", "sdružuje"]
      description: "Association/grouping"

    - root: "síť"
      weight: 2
      variations: ["síť", "sítě", "sítí", "sítěmi"]
      description: "Network (explicit network term)"

  # ========================================
  # 2. FUNDING & RESOURCE TIES (COMPON Tie Type 3)
  # Source: COMPON - Resource Dependency
  # Evidence of resource flows between actors
  # ========================================
  funding:
    - root: "grant"
      weight: 3
      variations: ["grantová podpora", "poskytovatel grantu", "příjemce grantu", "grantů", "grantu", "grantový"]
      description: "Grant Funding (Resource Dependency)"

    - root: "financ"
      weight: 3
      variations: ["financování", "spolufinancování", "finanční podpora", "finanční", "finance"]
      description: "Financing/Funding Sources"

    - root: "donor"
      weight: 3
      variations: ["donor", "dárce", "dárců", "darovat"]
      description: "Donor (Resource provider)"

    - root: "dotac"
      weight: 2
      variations: ["dotace", "dotační", "dotovat", "dotací"]
      description: "Subsidy (State funding)"

    - root: "nadac"
      weight: 2
      variations: ["nadace", "nadační", "nadací"]
      description: "Foundation (Philanthropic funding)"

    - root: "fond"
      weight: 2
      variations: ["fond", "fondu", "fondů"]
      description: "Fund"

    - root: "sponzor"
      weight: 2
      variations: ["sponzor", "sponzorovat", "sponzorství"]
      description: "Sponsor"

    - root: "podpor"
      weight: 2
      variations: ["podpora", "záštita", "podporovatel", "podporovat", "podporuje"]
      description: "Support/Sponsorship"

  # ========================================
  # 3. POLICY ACTORS (Network Nodes)
  # ========================================
  actors:
    # --- State Actors ---
    - root: "ministerstv"
      weight: 2
      variations: ["ministerstvo", "MŽP", "MPO", "resort", "ministr"]
      description: "Ministries (State Actors)"

    - root: "vlád"
      weight: 1
      variations: ["vláda", "vládní", "vlády"]
      description: "Government (generic - low weight)"

    - root: "parlament"
      weight: 2
      variations: ["parlament", "parlamentu", "parlamentní"]
      description: "Parliament"

    - root: "senát"
      weight: 2
      variations: ["senát", "senátu", "senátní", "senátor"]
      description: "Senate"

    - root: "poslanec"
      weight: 2
      variations: ["poslanec", "poslance", "poslanců", "poslanecký"]
      description: "Member of parliament"

    - root: "výbor"
      weight: 1
      variations: ["výbor", "výboru", "výborů"]
      description: "Committee"

    # --- Civil Society (NGOs) ---
    - root: "nezisk"
      weight: 2
      variations:
        - "nezisková organizace"
        - "NGO"
        - "spolek"
        - "občanské sdružení"
      description: "NGOs/Civil Society (Generic)"

    # --- Social Movements (Grassroots) ---
    - root: "hnutí"
      weight: 3
      variations:
        - "občanské hnutí"
        - "environmentální hnutí"
        - "ekologické hnutí"
      description: "Social Movements (Grassroots Actors)"

    # --- Research/Expert Actors ---
    - root: "ústav"
      weight: 2
      variations:
        - "výzkumný ústav"
        - "akademie věd"
        - "výzkumné centrum"
      description: "Research Institutes (Science-Policy interface)"

    # --- Business/Industry Actors ---
    - root: "svaz"
      weight: 2
      variations:
        - "svaz průmyslu"
        - "komora"
        - "asociace"
        - "hospodářská komora"
      description: "Industry Associations & Interest Groups"

  # ========================================
  # 4. POLICY TOPICS & FRAMES
  # ========================================
  topics:
    # --- Core Climate/Energy Policy ---
    - root: "klimat"
      weight: 2
      variations: ["změna klimatu", "klimatická politika", "ochrana klimatu", "klimatický zákon", "klimatu"]
      description: "Climate Change (General)"

    - root: "uhlí"
      weight: 2
      variations: ["uhlíková neutralita", "dekarbonizace", "nízkouhlíkový", "konec uhlí", "uhelný", "uhelné"]
      description: "Carbon/Coal/Decarbonization (Mitigation)"

    - root: "obnovitel"
      weight: 3
      variations: ["obnovitelné zdroje", "OZE", "fotovoltaika", "větrná energetika", "komunitní energetika"]
      description: "Renewable Energy (Key policy domain)"

    - root: "doprav"
      weight: 3
      variations: ["udržitelná doprava", "bezemisní mobilita", "elektromobilita", "emisní normy"]
      description: "Sustainable Transport"

    - root: "adaptac"
      weight: 3
      variations: ["adaptace na změnu klimatu", "adaptační strategie", "zadržování vody", "krajina"]
      description: "Adaptation (Oxford Policy Domain)"

    - root: "jadern"
      weight: 2
      variations: ["jaderná energetika", "jádro", "Dukovany", "Temelín"]
      description: "Nuclear Energy (Czech Transition Element)"

    # --- Czech Specific Frames (Lehotský et al. / Dubský et al.) ---
    # Research shows these are proxies for climate debates in CZ
    - root: "bezpečnost"
      weight: 3
      variations: ["energetická bezpečnost", "soběstačnost", "závislost na dovozu"]
      description: "Energy Security (Dominant Czech Frame - Lehotský et al.)"

    - root: "limit"
      weight: 3
      variations: ["územní limity", "prolomení limitů", "těžební limity"]
      description: "Mining Limits (Czech Coal Policy Frame - Lehotský et al.)"

    # --- EU Policy Framework (Dubský et al.) ---
    - root: "green deal"
      weight: 3
      variations: ["Green Deal", "Zelená dohoda", "Fit for 55", "Fit for Fifty-Five"]
      description: "EU Policy Framework (Green Deal discourse)"

    # --- Governance/Reporting (Oxford Domain: Disclosure) ---
    - root: "oznamov"
      weight: 3
      variations: ["nefinanční reporting", "ESG", "taxonomie", "CSRD", "povinné zveřejňování"]
      description: "Disclosure/Reporting (Oxford Domain)"

    - root: "strategi"
      weight: 1
      variations: ["strategie", "strategický", "strategii"]
      description: "Strategy (generic - context)"

    # --- Environment (Context) ---
    - root: "envirom"
      weight: 1
      variations: ["environment", "environmentální", "životní prostředí"]
      description: "Environment (generic)"

    - root: "ekolog"
      weight: 1
      variations: ["ekologie", "ekologický", "ekolog"]
      description: "Ecology (generic)"

# ========================================
# FILTERING THRESHOLDS
# Based on King et al. (2017): Precision over Recall
# ========================================
filtering:
  # Minimum raw score (total weighted keyword points)
  # Increased from 5 to 8 for precision (King et al.)
  min_raw_score: 8

  # Minimum density score (points per 100 words)
  # Ensures topic centrality, not just presence
  min_density_score: 0.7

  # Actor mentions handled by GLiNER in extraction phase
  # Set to 0 here - filtering focuses on Relations + Topics
  min_organization_mentions: 0

  # Deduplication similarity threshold (Jaccard index)
  similarity_threshold: 0.85

# ========================================
# BOILERPLATE REMOVAL
# ========================================
boilerplate:
  # Elements to remove (navigation, ads, etc.)
  junk_terms:
    - "navigation"
    - "footer"
    - "header"
    - "sidebar"
    - "menu"
    - "cookie"
    - "banner"
    - "advertisement"
    - "ad-container"
    - "ad-wrapper"
    - "ads-"
    - "social-"
    - "share-"
    - "breadcrumb"
    - "widget"
    - "popup"
    - "modal"
    - "subscribe"
    - "newsletter"
    - "pagination"
    - "promoted"
    - "related"
    - "archive"

  # Elements to protect (content areas)
  safe_terms:
    - "main"
    - "article"
    - "content"
    - "entry"
    - "post"
    - "body"
    - "text"
    - "page"
    - "col-"
    - "pripady"
    - "detail"
    - "wrapper"
    - "container"
    - "inner"
    - "single"
    - "layout"
    - "node"
    - "section"

  # Link density threshold (>60% links = navigation)
  link_density_threshold: 0.6
